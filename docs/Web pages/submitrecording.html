<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Submit Recording</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Submit Species Recording</h1>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="timeline.html">View Timeline</a>
</nav>

<main>
  <section>
    <h2>New Recording</h2>

    <form id="recordingForm">

      <label for="species">Species</label>
      <input type="text" id="species" placeholder="e.g. Northern Quoll" required>

      <label for="date">Date</label>
      <input type="date" id="date" required>

      <label for="location">Location</label>
      <input type="text" id="location" placeholder="e.g. Kakadu National Park" required>

      <label for="confidence">Confidence Score (%)</label>
      <input type="number" id="confidence" min="0" max="100" placeholder="0 - 100">

      <label for="audio">Audio File</label>
      <input type="file" id="audio">

      <label for="notes">Notes</label>
      <textarea id="notes" placeholder="Optional notes..."></textarea>

      <button type="submit">Submit Recording</button>

    </form>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
