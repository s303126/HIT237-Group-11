{% extends "base.html" %}

{% block title %}Submit Recording - Listening to NT's Disappearing Animals{% endblock %}

{% block content %} 
<section>
  <h2>Submit Species Recording</h2> 
  <p>
    Use this form to submit a species call recording with location, confidence score,
    and supporting notes.
  </p>

<!-- 
Each part of the recording form has different parameters to capture the data needed to complete a recording 
submission. As the following section is static, the dynamic section further below utilises class-based views
and Django forms to handle form rendering, validation, and submission processing.
-->
  <form id="recordingForm" method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <label for="species">Species</label>
    <input type="text" id="species" name="species" placeholder="e.g. Northern Quoll" required>

    <label for="date_recorded">Date Recorded</label>
    <input type="datetime-local" id="date_recorded" name="date_recorded" required>

    <label for="location_name">Location Name</label>
    <input type="text" id="location_name" name="location_name" placeholder="e.g. Kakadu National Park">

    <label for="latitude">Latitude</label>
    <input type="number" step="0.000001" id="latitude" name="latitude" placeholder="-12.720000" required>

    <label for="longitude">Longitude</label>
    <input type="number" step="0.000001" id="longitude" name="longitude" placeholder="132.530000" required>

    <label for="confidence_score">Confidence Score</label>
    <input type="number" step="0.01" min="0" max="1" id="confidence_score" name="confidence_score" placeholder="0.00 - 1.00">

    <label for="audio_file">Audio File</label>
    <input type="file" id="audio_file" name="audio_file">

    <label for="notes">Notes</label>
    <textarea id="notes" name="notes" placeholder="Optional notes..."></textarea>

    <button type="submit">Submit Recording</button>
  </form>
</section>
{% endblock %}
