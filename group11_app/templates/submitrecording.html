{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Submit Recording</title>
  <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

<header>
  <h1>Submit Species Recording</h1>
</header>

<nav>
  <a href="{% url 'homepage' %}">Home</a>
  <a href="{% url 'view_submissions' %}">View Timeline</a>
</nav>

<main>
  <section>
    <h2>New Recording</h2>

    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Submit Recording</button>
    </form>
  </section>
</main>

<script src="{% static 'script.js' %}"></script>
</body>
</html>
